<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Neo Brave workshop hero artwork</title>
  <desc id="desc">A dark creator studio with an original armored helmet, shelves, workbench tools, figures, and red teal lighting.</desc>
  <defs>
    <linearGradient id="backdrop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090a0f"/>
      <stop offset="0.42" stop-color="#111622"/>
      <stop offset="1" stop-color="#07171a"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f04444" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#f04444" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#f04444" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="tealGlow" cx="70%" cy="38%" r="46%">
      <stop offset="0" stop-color="#23c8c0" stop-opacity="0.58"/>
      <stop offset="0.55" stop-color="#23c8c0" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#23c8c0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="74%" cy="64%" r="30%">
      <stop offset="0" stop-color="#e8b95a" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#e8b95a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="helmetFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f5ef"/>
      <stop offset="0.52" stop-color="#8f98a8"/>
      <stop offset="1" stop-color="#2a3142"/>
    </linearGradient>
    <linearGradient id="helmetRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6868"/>
      <stop offset="1" stop-color="#9d1725"/>
    </linearGradient>
    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
